spring.application.name=board-login-img-react-backend
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/board_login_img_react?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# 업로드 (정적 /uploads/**)
app.upload-dir=${user.home}/board-login-img-react-uploads/
