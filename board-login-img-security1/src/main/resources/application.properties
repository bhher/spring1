spring.application.name=board-login-img-security1
server.port=8083

# MySQL — 기존 프로젝트와 분리된 스키마
spring.datasource.url=jdbc:mysql://localhost:3306/board_login_img_security1?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

app.upload-dir=${user.home}/board-login-img-security1-uploads/

# JWT (HS256, 최소 32바이트 비밀값 권장)
app.jwt.secret=board-login-img-security1-jwt-secret-key-change-me-32b
app.jwt.expiration-ms=86400000
