<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments :: head(pageTitle='로그인')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<main class="app-main">
    <div class="card">
        <h1>로그인</h1>
        <p class="meta">JWT를 받아 브라우저 <code>localStorage</code>에 저장합니다.</p>
        <div id="err" class="msg-error" style="display:none;"></div>
        <form id="f">
            <div class="form-row">
                <label for="username">아이디</label>
                <input id="username" name="username" type="text" required autocomplete="username" maxlength="50">
            </div>
            <div class="form-row">
                <label for="password">비밀번호</label>
                <input id="password" name="password" type="password" required autocomplete="current-password" maxlength="100">
            </div>
            <button type="submit" class="btn">로그인</button>
            <a class="btn secondary" th:href="@{/ui/register}" style="margin-left:0.5rem;">회원가입</a>
        </form>
    </div>
</main>
<script>
document.addEventListener('DOMContentLoaded', function () {
    board1InitNav();
    document.getElementById('f').addEventListener('submit', function (e) {
        e.preventDefault();
        var err = document.getElementById('err');
        err.style.display = 'none';
        var u = document.getElementById('username').value.trim();
        var p = document.getElementById('password').value;
        var params = new URLSearchParams(window.location.search);
        var next = params.get('next');
        if (!next) {
            next = board1Path('/ui/posts');
        }
        board1ApiJson('POST', board1Path('/api/auth/login'), { username: u, password: p }).then(function (data) {
            board1SetAuth(data.accessToken, data.username);
            board1Redirect(next);
        }).catch(function (ex) {
            err.style.display = 'block';
            err.textContent = ex.message || String(ex);
        });
    });
});
</script>
</body>
</html>
