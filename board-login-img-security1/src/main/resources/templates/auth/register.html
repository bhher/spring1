<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments :: head(pageTitle='회원가입')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<main class="app-main">
    <div class="card">
        <h1>회원가입</h1>
        <div id="err" class="msg-error" style="display:none;"></div>
        <div id="ok" class="msg-ok" style="display:none;"></div>
        <form id="f">
            <div class="form-row">
                <label for="username">아이디</label>
                <input id="username" name="username" type="text" required maxlength="50">
            </div>
            <div class="form-row">
                <label for="name">이름</label>
                <input id="name" name="name" type="text" required maxlength="100">
            </div>
            <div class="form-row">
                <label for="password">비밀번호</label>
                <input id="password" name="password" type="password" required maxlength="100">
            </div>
            <div class="form-row">
                <label for="passwordConfirm">비밀번호 확인</label>
                <input id="passwordConfirm" name="passwordConfirm" type="password" required maxlength="100">
            </div>
            <button type="submit" class="btn">가입</button>
            <a class="btn secondary" th:href="@{/ui/login}" style="margin-left:0.5rem;">로그인</a>
        </form>
    </div>
</main>
<script>
document.addEventListener('DOMContentLoaded', function () {
    board1InitNav();
    document.getElementById('f').addEventListener('submit', function (e) {
        e.preventDefault();
        var err = document.getElementById('err');
        var ok = document.getElementById('ok');
        err.style.display = 'none';
        ok.style.display = 'none';
        var body = {
            username: document.getElementById('username').value.trim(),
            name: document.getElementById('name').value.trim(),
            password: document.getElementById('password').value,
            passwordConfirm: document.getElementById('passwordConfirm').value
        };
        board1ApiJson('POST', board1Path('/api/auth/register'), body).then(function () {
            ok.style.display = 'block';
            ok.textContent = '가입되었습니다. 로그인 페이지로 이동합니다.';
            setTimeout(function () {
                board1Redirect(board1Path('/ui/login'));
            }, 1200);
        }).catch(function (ex) {
            err.style.display = 'block';
            err.textContent = ex.message || String(ex);
        });
    });
});
</script>
</body>
</html>
