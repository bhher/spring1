<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments :: head(pageTitle='글쓰기')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<main class="app-main">
    <div class="card">
        <h1>글쓰기</h1>
        <div id="err" class="msg-error" style="display:none;"></div>
        <form id="f" method="post" enctype="multipart/form-data">
            <div class="form-row">
                <label for="title">제목</label>
                <input id="title" name="title" type="text" required maxlength="200">
            </div>
            <div class="form-row">
                <label for="content">내용</label>
                <textarea id="content" name="content" required maxlength="10000"></textarea>
            </div>
            <div class="form-row">
                <label for="files">이미지 (여러 장 선택 가능)</label>
                <input id="files" name="files" type="file" accept="image/*" multiple>
            </div>
            <button type="submit" class="btn">등록</button>
            <a class="btn secondary" th:href="@{/ui/posts}" style="margin-left:0.5rem;">취소</a>
        </form>
    </div>
</main>
<script>
document.addEventListener('DOMContentLoaded', function () {
    board1InitNav();
    if (!board1GetToken()) {
        board1Redirect(board1Path('/ui/login?next=' + encodeURIComponent(board1Path('/ui/posts/write'))));
        return;
    }
    document.getElementById('f').addEventListener('submit', function (e) {
        e.preventDefault();
        var err = document.getElementById('err');
        err.style.display = 'none';
        var fd = new FormData(e.target);
        board1ApiSendForm('POST', board1Path('/api/posts'), fd).then(function () {
            board1Redirect(board1Path('/ui/posts'));
        }).catch(function (ex) {
            err.style.display = 'block';
            err.textContent = ex.message || String(ex);
        });
    });
});
</script>
</body>
</html>
