# 단위 테스트는 MySQL 없이 인메모리 H2 사용
spring.datasource.url=jdbc:h2:mem:boardloginimgsec1test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

app.upload-dir=${java.io.tmpdir}/board-login-img-security1-test-uploads/

app.jwt.secret=test-jwt-secret-key-at-least-32-chars-long!!
app.jwt.expiration-ms=3600000
