# 단위 테스트는 MySQL 없이 인메모리 H2 사용
spring.datasource.url=jdbc:h2:mem:boardloginimgtest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

app.upload-dir=${java.io.tmpdir}/board-login-img-test-uploads/
