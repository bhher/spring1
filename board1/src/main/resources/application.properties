spring.application.name=board1

# MySQL (메인 실행). H2는 build.gradle에서 testRuntimeOnly라 런타임에 섞이지 않음.
spring.datasource.url=jdbc:mysql://localhost:3306/boarddb?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false
