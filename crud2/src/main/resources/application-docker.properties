# Docker / docker-compose 실행 전용 (프로파일: docker)
# H2 파일 DB를 컨테이너 내 /data 에 두고, 볼륨으로 영속화합니다.

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:file:/data/crud2-db;DB_CLOSE_DELAY=-1;AUTO_SERVER=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# 호스트 브라우저 → 컨테이너 접속은 H2 입장에서 원격이라 기본 차단됨 → Docker에서만 허용
spring.h2.console.settings.web-allow-others=true

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

spring.thymeleaf.cache=true
