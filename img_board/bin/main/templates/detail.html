<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title th:text="${post.title}">상세</title>
	<style>
		body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
		.gallery { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1rem; }
		.card { border: 1px solid #eee; padding: 0.5rem; border-radius: 6px; }
		.card p { font-size: 0.8rem; color: #666; margin: 0 0 0.35rem; }
		a { color: #06c; }
		pre { white-space: pre-wrap; word-break: break-word; font-family: inherit; }
	</style>
</head>
<body>
<p>
	<a th:href="@{/}">목록</a>
	· <a th:href="@{/post/write}">글쓰기</a>
</p>
<h1 th:text="${post.title}">제목</h1>
<pre th:text="${post.content}">내용</pre>

<div class="gallery" th:if="${!post.images.isEmpty()}">
	<div class="card" th:each="img : ${post.images}">
		<p th:text="${img.originalName}">파일명</p>
		<img th:src="@{/uploads/{n}(n=${img.savedName})}" alt="원본" width="200"/>
		<img th:src="@{/uploads/{n}(n=${img.thumbnailSavedName})}" alt="썸네일" width="100"/>
	</div>
</div>
<p th:if="${post.images.isEmpty()}">첨부 이미지가 없습니다.</p>

<form th:action="@{/post/{id}/delete(id=${post.id})}" method="post" style="margin-top:1.5rem;">
	<button type="submit" onclick="return confirm('삭제할까요?');">삭제</button>
</form>
</body>
</html>
