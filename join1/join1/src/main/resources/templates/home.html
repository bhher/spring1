<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>홈 — Join1</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
	<div class="container">
		<a class="navbar-brand" th:href="@{/home}">Join1</a>
		<div class="navbar-nav ms-auto align-items-lg-center">
			<span class="navbar-text text-white me-3" sec:authorize="isAuthenticated()">
				<span sec:authentication="name"></span> 님
			</span>
			<form class="d-inline" th:action="@{/logout}" method="post">
				<button class="btn btn-outline-light btn-sm" type="submit">로그아웃</button>
			</form>
		</div>
	</div>
</nav>
<div class="container">
	<div class="row justify-content-center">
		<div class="col-md-8">
			<div class="card shadow-sm">
				<div class="card-body p-4">
					<h1 class="h4 mb-3">로그인 성공</h1>
					<p class="mb-0">
						환영합니다,
						<strong sec:authentication="name">user</strong> 님.
					</p>
					<p class="text-muted small mt-2 mb-0">이 페이지는 로그인한 사용자만 볼 수 있습니다.</p>
				</div>
			</div>
		</div>
	</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
