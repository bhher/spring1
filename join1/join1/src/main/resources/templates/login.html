<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>로그인 — Join1</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
	<div class="container">
		<a class="navbar-brand" th:href="@{/}">Join1</a>
		<div class="navbar-nav ms-auto">
			<a class="nav-link active" th:href="@{/login}">로그인</a>
			<a class="nav-link" th:href="@{/signup}">회원가입</a>
		</div>
	</div>
</nav>
<div class="container">
	<div class="row justify-content-center">
		<div class="col-md-6 col-lg-5">
			<div class="card shadow-sm">
				<div class="card-body p-4">
					<h1 class="h4 mb-4 text-center">로그인</h1>
					<div th:if="${param.registered}" class="alert alert-success" role="alert">
						회원가입이 완료되었습니다. 로그인해 주세요.
					</div>
					<div th:if="${param.error}" class="alert alert-danger" role="alert">
						아이디 또는 비밀번호가 올바르지 않습니다.
					</div>
					<div th:if="${param.logout}" class="alert alert-info" role="alert">
						로그아웃되었습니다.
					</div>
					<form th:action="@{/login}" method="post">
						<div class="mb-3">
							<label class="form-label" for="username">아이디</label>
							<input class="form-control" id="username" name="username" type="text" autocomplete="username" required autofocus/>
						</div>
						<div class="mb-3">
							<label class="form-label" for="password">비밀번호</label>
							<input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required/>
						</div>
						<button class="btn btn-primary w-100" type="submit">로그인</button>
					</form>
					<p class="text-center text-muted small mt-3 mb-0">
						계정이 없으신가요? <a th:href="@{/signup}">회원가입</a>
					</p>
				</div>
			</div>
		</div>
	</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
