<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>회원가입 — Join1</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
	<div class="container">
		<a class="navbar-brand" th:href="@{/}">Join1</a>
		<div class="navbar-nav ms-auto">
			<a class="nav-link" th:href="@{/login}">로그인</a>
			<a class="nav-link active" th:href="@{/signup}">회원가입</a>
		</div>
	</div>
</nav>
<div class="container">
	<div class="row justify-content-center">
		<div class="col-md-7 col-lg-6">
			<div class="card shadow-sm">
				<div class="card-body p-4">
					<h1 class="h4 mb-4 text-center">회원가입</h1>
					<div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>
					<form th:action="@{/signup}" th:object="${signupForm}" method="post" novalidate>
						<div class="mb-3">
							<label class="form-label" for="username">아이디</label>
							<input class="form-control" th:classappend="${#fields.hasErrors('username')} ? ' is-invalid'" id="username" th:field="*{username}" type="text" autocomplete="username"/>
							<div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
						</div>
						<div class="mb-3">
							<label class="form-label" for="email">이메일</label>
							<input class="form-control" th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'" id="email" th:field="*{email}" type="email" autocomplete="email"/>
							<div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
						</div>
						<div class="mb-3">
							<label class="form-label" for="password">비밀번호</label>
							<input class="form-control" th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'" id="password" th:field="*{password}" type="password" autocomplete="new-password"/>
							<div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
						</div>
						<div class="mb-3">
							<label class="form-label" for="passwordConfirm">비밀번호 확인</label>
							<input class="form-control" th:classappend="${#fields.hasErrors('passwordConfirm')} ? ' is-invalid'" id="passwordConfirm" th:field="*{passwordConfirm}" type="password" autocomplete="new-password"/>
							<div class="invalid-feedback" th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}"></div>
						</div>
						<button class="btn btn-primary w-100" type="submit">가입하기</button>
					</form>
					<p class="text-center text-muted small mt-3 mb-0">
						이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
					</p>
				</div>
			</div>
		</div>
	</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
