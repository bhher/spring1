<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="#{page.login.title}">로그인</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="wrap">
    <div class="card">
        <h1 class="page-title" th:text="#{page.login.heading}">로그인</h1>
        <p th:if="${param.registered}" class="msg" th:text="#{msg.registered}">회원가입 완료</p>
        <p th:if="${error}" class="err" th:text="${error}">오류</p>
        <form th:action="@{/login}" method="post">
            <label for="username" th:text="#{label.username}">아이디</label>
            <input type="text" id="username" name="username" th:value="${username}" autocomplete="username"/>
            <label for="password" th:text="#{label.password}">비밀번호</label>
            <input type="password" id="password" name="password" autocomplete="current-password"/>
            <button type="submit" class="btn" th:text="#{btn.login}">로그인</button>
        </form>
        <p class="hint" th:utext="#{hint.dummy}">더미 계정 안내</p>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
