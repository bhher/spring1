<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="#{page.register.title}">회원가입</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="wrap">
    <div class="card">
        <h1 class="page-title" th:text="#{page.register.heading}">회원가입</h1>
        <p th:if="${error}" class="err" th:text="${error}">오류</p>
        <form th:action="@{/register}" th:object="${form}" method="post">
            <label for="username" th:text="#{label.username}">아이디</label>
            <input type="text" id="username" th:field="*{username}" autocomplete="username"/>
            <p class="field-err" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
            <label for="password" th:text="#{label.password}">비밀번호</label>
            <input type="password" id="password" th:field="*{password}" autocomplete="new-password"/>
            <p class="field-err" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
            <label for="passwordConfirm" th:text="#{label.passwordConfirm}">비밀번호 확인</label>
            <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}" autocomplete="new-password"/>
            <p class="field-err" th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}"></p>
            <label for="name" th:text="#{label.name}">이름</label>
            <input type="text" id="name" th:field="*{name}" autocomplete="name"/>
            <p class="field-err" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            <button type="submit" class="btn" th:text="#{btn.register}">가입하기</button>
        </form>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
