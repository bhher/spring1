<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
	<meta charset="UTF-8">
	<title>회원가입</title>
</head>
<body>
<h2>회원가입</h2>
<form th:action="@{/register}" th:object="${member}" method="post">
	아이디: <input type="text" th:field="*{userId}" required><br>
	비밀번호: <input type="password" th:field="*{password}" required><br>
	이름: <input type="text" th:field="*{name}" required><br>
	이메일: <input type="email" th:field="*{email}" required><br>
	<button type="submit">가입하기</button>
</form>
</body>
</html>
