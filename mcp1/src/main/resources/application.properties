spring.application.name=mcp1

# OpenAI — 키는 ${} 로 감싸지 말 것. 아래 둘 중 하나만 사용:
# 1) 환경 변수: OPENAI_API_KEY=sk-...  (권장)
# 2) 직접 값: spring.ai.openai.api-key=sk-...  (${OPENAI_API_KEY} 처럼 "이름"만 넣음)
spring.ai.openai.api-key=${OPENAI_API_KEY}

spring.ai.openai.chat.options.model=gpt-4o-mini

# Spring AI + JDK HttpClient (이미지/멀티모달 등 안정화)
spring.http.client.factory=jdk

# MCP 클라이언트: 외부 MCP 서버 연결 시 true 로 두고 connections 를 채웁니다.
spring.ai.mcp.client.enabled=false
