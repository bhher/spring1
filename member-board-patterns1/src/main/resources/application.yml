# 1단계 기본: H2 인메모리 DB로 바로 실행 (MySQL은 아래 주석 참고)
spring:
  application:
    name: member-board-patterns
  datasource:
    url: jdbc:h2:mem:memberboard;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

