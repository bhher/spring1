<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
	<meta charset="UTF-8"/>
	<title>로그인</title>
	<style>
		body { font-family: sans-serif; max-width: 480px; margin: 2rem auto; }
		label { display: block; margin-top: 0.75rem; }
		input { width: 100%; padding: 0.5rem; box-sizing: border-box; }
		button { margin-top: 1rem; padding: 0.5rem 1rem; }
		.error { color: #c00; font-size: 0.9rem; }
	</style>
</head>
<body>
<h1>로그인</h1>
<form th:action="@{/login}" th:object="${form}" method="post">
	<input type="hidden" name="redirect" th:value="${redirect}"/>
	<p class="error" th:if="${#fields.hasGlobalErrors()}" th:text="${#fields.globalErrors()[0]}">에러</p>
	<label>이메일
		<input type="email" th:field="*{email}"/>
		<span class="error" th:errors="*{email}"></span>
	</label>
	<label>비밀번호
		<input type="password" th:field="*{password}"/>
		<span class="error" th:errors="*{password}"></span>
	</label>
	<button type="submit">로그인</button>
</form>
<p><a th:href="@{/signup}">회원가입</a> · <a th:href="@{/boards}">게시판</a></p>
</body>
</html>
