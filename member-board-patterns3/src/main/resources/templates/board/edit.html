<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
	<meta charset="UTF-8"/>
	<title>글 수정</title>
	<style>
		body { font-family: sans-serif; max-width: 720px; margin: 2rem auto; }
		label { display: block; margin-top: 0.75rem; }
		input, textarea { width: 100%; padding: 0.5rem; box-sizing: border-box; }
		textarea { min-height: 200px; }
		button { margin-top: 1rem; }
		.error { color: #c00; font-size: 0.9rem; }
	</style>
</head>
<body>
<h1>글 수정</h1>
<form th:action="@{/boards/{id}/edit(id=${boardId})}" th:object="${form}" method="post">
	<p class="error" th:if="${#fields.hasGlobalErrors()}" th:text="${#fields.globalErrors()[0]}">에러</p>
	<label>제목
		<input type="text" th:field="*{title}"/>
		<span class="error" th:errors="*{title}"></span>
	</label>
	<label>내용
		<textarea th:field="*{content}"></textarea>
		<span class="error" th:errors="*{content}"></span>
	</label>
	<button type="submit">저장</button>
</form>
<p><a th:href="@{/boards/{id}(id=${boardId})}">상세로</a> · <a th:href="@{/boards}">목록</a></p>
</body>
</html>
