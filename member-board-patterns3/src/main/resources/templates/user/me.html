<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
	<meta charset="UTF-8"/>
	<title>내 정보</title>
	<style>
		body { font-family: sans-serif; max-width: 560px; margin: 2rem auto; }
		dl { display: grid; grid-template-columns: 120px 1fr; gap: 0.35rem 1rem; }
		dt { font-weight: bold; }
		form.inline { display: inline; }
	</style>
</head>
<body>
<h1>회원 정보</h1>
<dl>
	<dt>ID</dt>
	<dd th:text="${profile.id}">1</dd>
	<dt>이메일</dt>
	<dd th:text="${profile.email}">a@b.com</dd>
	<dt>닉네임</dt>
	<dd th:text="${profile.nickname}">nick</dd>
	<dt>가입일</dt>
	<dd th:text="${#temporals.format(profile.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</dd>
</dl>
<p>
	<a th:href="@{/boards}">게시판</a>
	<form class="inline" th:action="@{/logout}" method="post">
		<button type="submit">로그아웃</button>
	</form>
</p>
</body>
</html>
