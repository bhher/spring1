<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('주문 상세')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container" th:object="${order}">
	<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
	<h2 class="mb-3">주문 상세</h2>
	<dl class="row">
		<dt class="col-sm-3">주문번호</dt>
		<dd class="col-sm-9" th:text="*{orderNumber}">-</dd>
		<dt class="col-sm-3">총 금액</dt>
		<dd class="col-sm-9" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + '원'">0</dd>
		<dt class="col-sm-3">상태</dt>
		<dd class="col-sm-9">
			<span class="badge bg-secondary" th:if="*{status.name() == 'ORDERED'}">주문완료</span>
			<span class="badge bg-dark" th:if="*{status.name() == 'CANCELLED'}">취소</span>
		</dd>
		<dt class="col-sm-3">주문일시</dt>
		<dd class="col-sm-9" th:text="${#temporals.format(order.orderedAt, 'yyyy-MM-dd HH:mm')}">-</dd>
		<dt class="col-sm-3">모의 결제 완료</dt>
		<dd class="col-sm-9" th:text="${#temporals.format(order.paymentConfirmedAt, 'yyyy-MM-dd HH:mm')}">-</dd>
	</dl>
	<h4 class="mt-4">주문 상품</h4>
	<table class="table">
		<thead>
		<tr>
			<th>상품명</th>
			<th>단가</th>
			<th>수량</th>
			<th>금액</th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="line : *{lines}">
			<td>
				<a th:if="${line.productId != null}" th:href="@{/products/{id}(id=${line.productId})}" th:text="${line.productName}">상품</a>
				<span th:if="${line.productId == null}" th:text="${line.productName}">상품</span>
			</td>
			<td th:text="${#numbers.formatDecimal(line.unitPrice, 0, 'COMMA', 0, 'POINT')} + '원'">0</td>
			<td th:text="${line.quantity}">0</td>
			<td th:text="${#numbers.formatDecimal(line.lineTotal, 0, 'COMMA', 0, 'POINT')} + '원'">0</td>
		</tr>
		</tbody>
	</table>
	<form th:if="*{status.name() == 'ORDERED'}" th:action="@{/orders/{id}/cancel(id=*{id})}" method="post" class="mt-3">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<button type="submit" class="btn btn-outline-danger" onclick="return confirm('주문을 취소할까요?');">주문 취소</button>
	</form>
	<a class="btn btn-link" th:href="@{/mypage/orders}">← 목록</a>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
