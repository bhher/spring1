<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${product.name})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container" th:object="${product}">
	<div class="row g-4">
		<div class="col-md-6">
			<div id="carouselProduct" class="carousel slide" th:if="${!#lists.isEmpty(product.images)}">
				<div class="carousel-inner rounded">
					<div class="carousel-item" th:each="img, stat : *{images}" th:classappend="${stat.first} ? 'active'">
						<img th:src="${img.url}" class="d-block w-100 detail-img" alt="상품"/>
					</div>
				</div>
				<button class="carousel-control-prev" type="button" data-bs-target="#carouselProduct" data-bs-slide="prev">
					<span class="carousel-control-prev-icon"></span>
				</button>
				<button class="carousel-control-next" type="button" data-bs-target="#carouselProduct" data-bs-slide="next">
					<span class="carousel-control-next-icon"></span>
				</button>
			</div>
			<img th:if="${#lists.isEmpty(product.images)}" th:src="@{/images/no-image.svg}" class="img-fluid rounded border" alt="이미지 없음"/>
		</div>
		<div class="col-md-6">
			<h2 th:text="*{name}">상품명</h2>
			<p class="fs-4 fw-bold text-primary" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + '원'">0원</p>
			<p class="text-muted" th:text="|재고 *{stockQuantity}개|">재고</p>
			<hr/>
			<p class="pre-line" th:text="*{description}">설명</p>
			<div sec:authorize="isAuthenticated()" class="mt-4">
				<form class="row g-2 align-items-end" th:action="@{/cart/items}" method="post">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
					<input type="hidden" name="productId" th:value="*{id}"/>
					<div class="col-auto">
						<label class="form-label">수량</label>
						<input type="number" name="quantity" class="form-control" value="1" min="1" th:attr="max=*{stockQuantity}"/>
					</div>
					<div class="col-auto">
						<button type="submit" class="btn btn-primary" th:disabled="*{stockQuantity == 0}">장바구니 담기</button>
					</div>
				</form>
			</div>
			<p sec:authorize="!isAuthenticated()" class="text-muted mt-3">
				<a th:href="@{/login}">로그인</a> 후 장바구니에 담을 수 있습니다.
			</p>
		</div>
	</div>
	<a class="btn btn-link mt-4" th:href="@{/products}">← 목록</a>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
