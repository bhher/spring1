spring:
  datasource:
    url: jdbc:h2:mem:shoppingmall;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  upload-dir: ${java.io.tmpdir}/shopping-mall-test-uploads/
