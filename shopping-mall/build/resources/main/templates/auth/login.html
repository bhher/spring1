<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('로그인')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container" style="max-width: 420px">
	<h2 class="mb-4">로그인</h2>
	<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
	<div th:if="${param.error}" class="alert alert-danger">이메일 또는 비밀번호가 올바르지 않습니다.</div>
	<div th:if="${param.logout}" class="alert alert-info">로그아웃되었습니다.</div>
	<form th:action="@{/login}" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<div class="mb-3">
			<label class="form-label">이메일</label>
			<input type="email" name="username" class="form-control" required autocomplete="username"/>
		</div>
		<div class="mb-3">
			<label class="form-label">비밀번호</label>
			<input type="password" name="password" class="form-control" required autocomplete="current-password"/>
		</div>
		<button type="submit" class="btn btn-primary w-100">로그인</button>
	</form>
	<p class="mt-3 text-center text-muted small">
		계정이 없으면 <a th:href="@{/register}">회원가입</a>
	</p>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
