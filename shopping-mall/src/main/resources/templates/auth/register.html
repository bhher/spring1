<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('회원가입')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container" style="max-width: 480px">
	<h2 class="mb-4">회원가입</h2>
	<form th:action="@{/register}" th:object="${form}" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<div class="mb-3">
			<label class="form-label">이메일</label>
			<input type="email" class="form-control" th:field="*{email}" required/>
			<div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
		</div>
		<div class="mb-3">
			<label class="form-label">비밀번호</label>
			<input type="password" class="form-control" th:field="*{password}" required minlength="4"/>
			<div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
		</div>
		<div class="mb-3">
			<label class="form-label">이름</label>
			<input type="text" class="form-control" th:field="*{name}" required/>
			<div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
		</div>
		<button type="submit" class="btn btn-primary w-100">가입하기</button>
	</form>
	<p class="mt-3 text-center text-muted small">
		이미 계정이 있으면 <a th:href="@{/login}">로그인</a>
	</p>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
