<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('상품 목록')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
	<h2 class="mb-3">상품 목록</h2>
	<form class="row g-2 mb-4" method="get" th:action="@{/products}">
		<div class="col-auto flex-grow-1">
			<input type="search" name="keyword" class="form-control" placeholder="상품명 검색"
			       th:value="${keyword}"/>
		</div>
		<div class="col-auto">
			<button type="submit" class="btn btn-outline-primary">검색</button>
		</div>
	</form>
	<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
		<div class="col" th:each="p : ${page.content}">
			<div class="card h-100 shadow-sm product-card">
				<a th:href="@{/products/{id}(id=${p.id})}">
					<img th:src="${p.thumbnailUrl}" class="card-img-top product-thumb" alt="상품 이미지"/>
				</a>
				<div class="card-body d-flex flex-column">
					<h5 class="card-title">
						<a class="text-decoration-none text-dark" th:href="@{/products/{id}(id=${p.id})}"
						   th:text="${p.name}">이름</a>
					</h5>
					<p class="card-text text-muted small mb-1" th:text="|재고 ${p.stockQuantity}|">재고</p>
					<p class="card-text fw-semibold mt-auto" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + '원'">0원</p>
				</div>
			</div>
		</div>
	</div>
	<p th:if="${page.isEmpty()}" class="text-muted">등록된 상품이 없습니다.</p>
	<nav th:if="${page.totalPages > 1}" class="mt-4">
		<ul class="pagination justify-content-center">
			<li class="page-item" th:classappend="${page.first} ? 'disabled'">
				<a class="page-link"
				   th:href="@{/products(page=${page.number - 1}, keyword=${keyword})}">이전</a>
			</li>
			<li class="page-item disabled">
				<span class="page-link" th:text="|${page.number + 1} / ${page.totalPages}|">1/1</span>
			</li>
			<li class="page-item" th:classappend="${page.last} ? 'disabled'">
				<a class="page-link"
				   th:href="@{/products(page=${page.number + 1}, keyword=${keyword})}">다음</a>
			</li>
		</ul>
	</nav>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
