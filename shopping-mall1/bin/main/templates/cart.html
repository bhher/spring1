<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('장바구니')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
	<h2 class="mb-3">장바구니</h2>
	<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
	<div th:if="${#lists.isEmpty(lines)}" class="alert alert-info">장바구니가 비어 있습니다.</div>
	<table class="table align-middle" th:if="${!#lists.isEmpty(lines)}">
		<thead>
		<tr>
			<th></th>
			<th>상품</th>
			<th>단가</th>
			<th>수량</th>
			<th>금액</th>
			<th></th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="line : ${lines}">
			<td style="width: 80px">
				<img th:src="${line.thumbnailUrl}" class="cart-thumb rounded" alt=""/>
			</td>
			<td>
				<a th:href="@{/products/{id}(id=${line.productId})}" th:text="${line.productName}">상품</a>
			</td>
			<td th:text="${#numbers.formatDecimal(line.unitPrice, 0, 'COMMA', 0, 'POINT')} + '원'">0</td>
			<td>
				<form class="d-flex gap-1" th:action="@{/cart/items/{id}/quantity(id=${line.cartItemId})}" method="post">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
					<input type="number" name="quantity" class="form-control form-control-sm" style="width: 5rem"
					       th:value="${line.quantity}" min="1"/>
					<button type="submit" class="btn btn-sm btn-outline-secondary">변경</button>
				</form>
			</td>
			<td th:text="${#numbers.formatDecimal(line.lineAmount, 0, 'COMMA', 0, 'POINT')} + '원'">0</td>
			<td>
				<form th:action="@{/cart/items/{id}/remove(id=${line.cartItemId})}" method="post">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
					<button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
				</form>
			</td>
		</tr>
		</tbody>
	</table>
	<div class="d-flex justify-content-between align-items-center mt-3" th:if="${!#lists.isEmpty(lines)}">
		<a class="btn btn-outline-secondary" th:href="@{/products}">쇼핑 계속</a>
		<form th:action="@{/orders/checkout}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
			<button type="submit" class="btn btn-success">주문하기 (모의 결제)</button>
		</form>
	</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
