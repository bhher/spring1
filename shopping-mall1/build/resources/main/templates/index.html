<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('쇼핑몰 홈')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
	<div class="p-5 mb-4 bg-light rounded-3">
		<div class="container-fluid py-5">
			<h1 class="display-5 fw-bold">데모 쇼핑몰</h1>
			<p class="col-md-8 fs-5 text-muted">
				Spring Boot 3, JPA, Thymeleaf, Spring Security(세션) 기반 포트폴리오용 예제입니다.
				상품을 둘러보고 장바구니·주문(모의 결제) 흐름을 확인해 보세요.
			</p>
			<a class="btn btn-primary btn-lg" th:href="@{/products}">상품 보러가기</a>
		</div>
	</div>
	<div class="row g-3" sec:authorize="!hasRole('ADMIN')">
		<div class="col-md-6">
			<div class="card h-100 border-0 shadow-sm">
				<div class="card-body">
					<h5 class="card-title">일반 회원</h5>
					<p class="card-text small">회원가입 후 로그인하면 장바구니와 주문이 가능합니다.</p>
				</div>
			</div>
		</div>
		<div class="col-md-6">
			<div class="card h-100 border-0 shadow-sm">
				<div class="card-body">
					<h5 class="card-title">관리자</h5>
					<p class="card-text small">
						기본 계정: <code>admin@shopping.local</code> / <code>admin1234</code>
					</p>
				</div>
			</div>
		</div>
	</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
