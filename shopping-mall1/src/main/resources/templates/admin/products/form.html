<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('상품 등록·수정')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
	<h2 class="mb-3" th:text="${editMode} ? '상품 수정' : '상품 등록'">상품</h2>
	<form th:object="${form}" method="post" enctype="multipart/form-data"
	      th:action="${editMode} ? @{/admin/products/{id}(id=${form.id})} : @{/admin/products}">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<div class="mb-3">
			<label class="form-label">상품명</label>
			<input type="text" class="form-control" th:field="*{name}" required/>
			<div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
		</div>
		<div class="mb-3">
			<label class="form-label">설명</label>
			<textarea class="form-control" rows="6" th:field="*{description}" required></textarea>
			<div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
		</div>
		<div class="row">
			<div class="col-md-6 mb-3">
				<label class="form-label">가격 (원)</label>
				<input type="number" class="form-control" th:field="*{price}" step="0.01" min="0" required/>
				<div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
			</div>
			<div class="col-md-6 mb-3">
				<label class="form-label">재고 수량</label>
				<input type="number" class="form-control" th:field="*{stockQuantity}" min="0" required/>
				<div class="text-danger small" th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}"></div>
			</div>
		</div>
		<div class="mb-3" th:if="${editMode}">
			<label class="form-label">추가 이미지 (선택)</label>
			<input type="file" class="form-control" name="images" multiple accept="image/*"/>
			<p class="form-text">기존 이미지는 유지되며, 선택한 파일이 뒤에 추가됩니다.</p>
		</div>
		<div class="mb-3" th:if="${!editMode}">
			<label class="form-label">상품 이미지</label>
			<input type="file" class="form-control" name="images" multiple accept="image/*"/>
			<p class="form-text">여러 장 선택 가능합니다.</p>
		</div>
		<div class="mb-3" th:if="${editMode and product != null and !#lists.isEmpty(product.images)}">
			<label class="form-label">등록된 이미지</label>
			<div class="d-flex flex-wrap gap-2">
				<div th:each="img : ${product.images}">
					<img th:src="${img.thumbnailUrl}" class="rounded border" style="height: 96px; object-fit: cover;" alt=""/>
				</div>
			</div>
		</div>
		<button type="submit" class="btn btn-primary" th:text="${editMode} ? '저장' : '등록'">저장</button>
		<a class="btn btn-outline-secondary" th:href="@{/admin/products}">목록</a>
	</form>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
