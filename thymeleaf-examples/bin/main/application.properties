spring.application.name=thymeleaf-examples
# 이미 사용 중이면 다른 포트로 변경 (README "Port ... was already in use" 참고)
server.port=9291

spring.thymeleaf.cache=false

# ========== H2 DB + 콘솔 ==========
# [H2 콘솔] http://localhost:<위 server.port>/h2-console
#
# [로그인 폼] JDBC URL 은 아래 spring.datasource.url 과 동일하게 입력
#   JDBC URL  = jdbc:h2:~/test_boardlogin
#   User Name = sa
#   Password  = (비움)
#
# jdbc:h2:~/이름  → 사용자 홈 디렉터리에 test_boardlogin.mv.db 파일 DB (H2 단축 표기)

spring.datasource.url=jdbc:h2:~/test_boardlogin
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ========== JPA ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
