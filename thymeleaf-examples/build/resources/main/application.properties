spring.application.name=thymeleaf-examples
# 이미 사용 중이면 9291 등으로 변경 (README "Port 9290 was already in use" 참고)
server.port=9291

spring.thymeleaf.cache=false

# ========== H2 DB + 콘솔 ==========
# [H2 콘솔 접속] 앱 실행 후 브라우저에서 열기:
#   http://localhost:9290/h2-console
#
# [로그인 폼 입력] (JDBC URL 은 아래 spring.datasource.url 과 완전히 동일하게 붙여 넣으세요)
#   JDBC URL  = jdbc:h2:file:~/thymeleaf_examples_db;AUTO_SERVER=TRUE
#   (H2 2.x 는 AUTO_SERVER 와 DB_CLOSE_ON_EXIT 동시 사용 미지원 → URL 에서 제외)
#   User Name = sa
#   Password  = (비움)
#
# 같은 DB 파일에 앱과 콘솔이 붙습니다. 앱이 꺼져 있으면 파일 DB만 단독으로 열 수도 있습니다.

spring.datasource.url=jdbc:h2:file:~/thymeleaf_examples_db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# 다른 PC 브라우저에서 이 PC의 9290 포트로 콘솔을 열 때만 true (로컬만 쓰면 false 유지)
spring.h2.console.settings.web-allow-others=false

# ========== JPA ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
