<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{layouts/fragments :: head}"></head>
<body class="bg-light">
<nav th:replace="~{layouts/fragments :: nav}"></nav>
<main class="container py-4">
	<h1 class="h4 mb-3" th:text="${pageTitle}">제목</h1>
	<p><code>@{/path}</code> 는 컨텍스트 경로를 붙여 줍니다.</p>
	<ul>
		<li><a th:href="@{/}">홈 <code th:text="@{/}">/ </code></a></li>
		<li><a th:href="@{/demo/condition(role='admin')}">쿼리 포함 링크</a></li>
		<li><a th:href="@{/demo/link(id=${id})}">경로 변수·쿼리 혼합</a> — 현재 <code>id</code>=<span th:text="${id}">0</span></li>
	</ul>
	<p class="small text-muted">템플릿에서만 보이는 URL 표현: <code th:text="@{/demo/form}">/demo/form</code></p>
	<p class="mt-3"><a th:href="@{/}">← 홈</a></p>
</main>
<footer th:replace="~{layouts/fragments :: footer}"></footer>
</body>
</html>
